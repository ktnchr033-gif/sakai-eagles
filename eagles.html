    ab:["BB","HBP","SH","SF"].includes(result)?0:1,
    h:["1B","2B","3B","HR"].includes(result)?1:0,
    single:result==="1B"?1:0,d2:result==="2B"?1:0,
    d3:result==="3B"?1:0,hr:result==="HR"?1:0,
    bb:result==="BB"?1:0,hbp:result==="HBP"?1:0,
    sf:result==="SF"?1:0,sh:result==="SH"?1:0,k:result==="K"?1:0,
  });

  const addAb=(result)=>{
    if(!selPlayer||!gameOpp) return;
    setAtbats(prev=>[...prev,{player:selPlayer,result,hand:pitcherHand,risp,rbi:pendingRBI,run:pendingRun,order:battingOrder,gameDate,gameOpp,gameType,gameNum,gameTeam}]);
    setRisp(false);setPendingRBI(0);setPendingRun(0);setSaved(true);setTimeout(()=>setSaved(false),900);
  };
  const addSB=(type)=>{
    if(!selPlayer) return;
    setSbLog(prev=>[...prev,{player:selPlayer,type,gameOpp,gameType,gameTeam}]);
  };

  const exportText=()=>{
    const gid=`${gameDate} ${gameOpp} ${gameType}戦${gameNum}`;
    const lines=["試合ID\t打者\t打順\t代打\t相手投手\t得点圏\t打数\t安打\t2B\t3B\tHR\tBB\tHBP\tSF\tSH\tK\t打点\t得点"];
    atbats.forEach((ab,i)=>{
      const s=rts(ab.result);
      lines.push(`${i===0?gid:""}\t${ab.player}\t${ab.order}\t0\t${ab.hand}\t${ab.risp?1:0}\t${s.ab}\t${s.h}\t${s.d2}\t${s.d3}\t${s.hr}\t${s.bb}\t${s.hbp}\t${s.sf}\t${s.sh}\t${s.k}\t${ab.rbi}\t${ab.run||0}`);
    });
    return lines.join("\n");
  };

  const summary=()=>{
    const ps=[...new Set(atbats.map(a=>a.player))];
    return ps.map(p=>{
      const pabs=atbats.filter(a=>a.player===p);
      let ab=0,h=0,bb=0,k=0,hr=0,rbi=0,run=0;
      pabs.forEach(a=>{const s=rts(a.result);ab+=s.ab;h+=s.h;bb+=s.bb;k+=s.k;hr+=s.hr;rbi+=a.rbi;run+=a.run||0;});
      return{p,ab,h,bb,k,hr,rbi,run,avg:ab>0?(h/ab).toFixed(3).replace(/^0/,""):"-",pa:pabs.length};
    });
  };

  const gameReady=gameOpp.trim().length>0;
  const bs=(active,color=C.accent)=>({padding:"8px",borderRadius:10,border:`1px solid ${active?color+"66":C.border}`,cursor:"pointer",fontSize:12,fontWeight:700,background:active?`${color}33`:"rgba(255,255,255,0.05)",color:active?color:C.dim});
  const mns={width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 4px",color:"#fff",fontSize:15,fontWeight:700,textAlign:"center",outline:"none",boxSizing:"border-box"};

  return(
    <div style={{paddingBottom:80}}>
      <div style={{background:"linear-gradient(135deg,#1A2D42,#0B1520)",padding:"14px 14px 10px",borderBottom:`1px solid rgba(196,118,58,0.25)`}}>
        <div style={{fontSize:18,fontWeight:900,color:"#fff"}}>試合記録</div>
        <div style={{fontSize:11,color:C.sub,marginTop:1,marginBottom:10}}>リアルタイム入力 · iPad対応</div>
        <div style={{display:"flex",gap:5,overflowX:"auto"}}>
          {[["game","⚾ 打席"],["summary","📊 今日"],["export","📤 出力"],["measure","📏 測定"]].map(([k,l])=>(
            <button key={k} onClick={()=>setMode(k)} style={{flexShrink:0,padding:"5px 11px",borderRadius:20,border:"none",cursor:"pointer",background:mode===k?"rgba(196,118,58,0.22)":"rgba(255,255,255,0.06)",color:mode===k?C.accent:C.sub,fontSize:11,fontWeight:mode===k?800:500,border:mode===k?`1px solid rgba(196,118,58,0.45)`:`1px solid ${C.border}`}}>{l}</button>
          ))}
        </div>
      </div>
      {saved&&<div style={{margin:"10px 14px 0",background:"rgba(76,175,114,0.12)",borderRadius:10,padding:"8px 14px",border:"1px solid rgba(76,175,114,0.35)",display:"flex",gap:8,alignItems:"center"}}><span>✅</span><span style={{fontSize:13,fontWeight:700,color:C.green}}>記録！</span></div>}
      <div style={{padding:"13px 14px"}}>

        {mode==="game"&&<>
          <Card style={{marginBottom:12,background:"rgba(91,141,239,0.06)",border:`1px solid rgba(91,141,239,0.25)`}}>
            <SL color={C.blue}>試合設定</SL>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div>
                <label style={{fontSize:10,color:C.sub,display:"block",marginBottom:3}}>日付</label>
                <input value={gameDate} onChange={e=>setGameDate(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px",color:"#fff",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
              </div>
              <div>
                <label style={{fontSize:10,color:C.sub,display:"block",marginBottom:3}}>チーム</label>
                <div style={{display:"flex",gap:3}}>
                  {[["Jr","ジュニア"],["Reg","レギュラー"],["SJ","スーパージュニア"]].map(([k,v])=>(
                    <button key={k} onClick={()=>setGameTeam(v)} style={{...bs(gameTeam===v,C.blue),flex:1,fontSize:9,padding:"7px 2px"}}>{k}</button>
                  ))}
                </div>
              </div>
            </div>
            <div style={{marginBottom:8}}>
              <label style={{fontSize:10,color:C.sub,display:"block",marginBottom:3}}>対戦相手</label>
              <input value={gameOpp} onChange={e=>setGameOpp(e.target.value)} placeholder="例: 明日香ヤング" style={{width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid ${gameReady?C.blue:C.border}`,borderRadius:8,padding:"9px 12px",color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box"}}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <div style={{flex:1}}>
                <label style={{fontSize:10,color:C.sub,display:"block",marginBottom:3}}>種別</label>
                <div style={{display:"flex",gap:4}}>
                  {[["OP","OP戦"],["公式","公式戦"]].map(([v,l])=>(
                    <button key={v} onClick={()=>setGameType(v)} style={{...bs(gameType===v,C.green),flex:1,fontSize:11}}>{l}</button>
                  ))}
                </div>
              </div>
              <div>
                <label style={{fontSize:10,color:C.sub,display:"block",marginBottom:3}}>試合</label>
                <div style={{display:"flex",gap:4}}>
                  {["①","②","③"].map(n=>(
                    <button key={n} onClick={()=>setGameNum(n)} style={{...bs(gameNum===n,C.accent),padding:"7px 10px",fontSize:13}}>{n}</button>
                  ))}
                </div>
              </div>
            </div>
          </Card>

          {!gameReady&&<div style={{textAlign:"center",padding:"20px 0",color:C.dim,fontSize:13}}>↑ 対戦相手を入力してください</div>}

          {gameReady&&<>
            <Card style={{marginBottom:10}}>
              <SL>打順を選ぶ</SL>
              <div style={{display:"grid",gridTemplateColumns:"repeat(9,1fr)",gap:4,marginBottom:4}}>
                {[1,2,3,4,5,6,7,8,9].map(n=>(
                  <button key={n} onClick={()=>setBattingOrder(n)} style={{
                    padding:"10px 2px",borderRadius:8,border:`1px solid ${battingOrder===n?C.accent+"88":C.border}`,
                    cursor:"pointer",background:battingOrder===n?`${C.accent}22`:"rgba(255,255,255,0.04)",
                    color:battingOrder===n?C.accent:C.dim,fontSize:14,fontWeight:battingOrder===n?900:500,
                  }}>{n}</button>
                ))}
              </div>
            </Card>
            <Card style={{marginBottom:10}}>
              <SL>打者を選ぶ</SL>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                {ALL_PLAYERS.map(p=>{
                  const isReg=REG_PLAYERS.includes(p);const isSJ=SJ_PLAYERS.includes(p);
                  const dot=isReg?C.blue:isSJ?C.purple:C.accent;const active=selPlayer===p;
                  return(<button key={p} onClick={()=>setSelPlayer(p)} style={{padding:"6px 10px",borderRadius:20,border:`1px solid ${active?dot+"88":C.border}`,cursor:"pointer",background:active?`${dot}33`:"rgba(255,255,255,0.05)",color:active?dot:C.sub,fontSize:12,fontWeight:active?800:500,display:"flex",alignItems:"center",gap:4}}>
                    <span style={{width:5,height:5,borderRadius:"50%",background:dot,display:"inline-block"}}/>{p}
                  </button>);
                })}
              </div>
            </Card>

            {selPlayer&&<Card style={{marginBottom:10}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
                <span style={{fontSize:14,fontWeight:800,color:C.accent}}>{battingOrder}番 {selPlayer}</span>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  <span style={{fontSize:11,color:C.sub}}>投手:</span>
                  {["R","L"].map(h=>(<button key={h} onClick={()=>setPitcherHand(h)} style={{...bs(pitcherHand===h,h==="R"?C.blue:C.purple),padding:"4px 12px",fontSize:12}}>{h}</button>))}
                </div>
                <button onClick={()=>setRisp(!risp)} style={{...bs(risp,C.green),padding:"4px 10px",fontSize:11}}>{risp?"🔥得点圏":"得点圏"}</button>
              </div>
              <SL>打席結果</SL>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
                {RESULTS.map(({l,k,color})=>(
                  <button key={k} onClick={()=>addAb(k)} style={{padding:"14px 4px",borderRadius:10,border:`1px solid ${color}44`,cursor:"pointer",background:`${color}11`,color,fontSize:13,fontWeight:700}}>{l}</button>
                ))}
              </div>
              {/* 打点・得点 */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:6}}>
                {[["打点(RBI)","rbi",C.green],["得点(R)","run",C.blue]].map(([l,k,c])=>(
                  <div key={k} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"8px 10px",border:`1px solid ${C.border}`}}>
                    <div style={{fontSize:10,color:C.sub,marginBottom:4}}>{l}</div>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      {[0,1,2,3,4].map(n=>(
                        <button key={n} onClick={()=>k==="rbi"?setPendingRBI(n):setPendingRun(n)} style={{
                          flex:1,padding:"8px 2px",borderRadius:7,border:`1px solid ${(k==="rbi"?pendingRBI:pendingRun)===n?c+"88":C.border}`,
                          cursor:"pointer",background:(k==="rbi"?pendingRBI:pendingRun)===n?`${c}33`:"rgba(255,255,255,0.03)",
                          color:(k==="rbi"?pendingRBI:pendingRun)===n?c:C.dim,fontSize:14,fontWeight:700,
                        }}>{n}</button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </Card>}

            {/* 盗塁ボタン：選手選択不要・いつでも押せる */}
            <Card style={{marginBottom:10,background:"rgba(76,175,114,0.05)",border:`1px solid rgba(76,175,114,0.2)`}}>
              <SL color={C.green}>🏃 盗塁記録（走者が走った瞬間に押す）</SL>
              <div style={{marginBottom:8}}>
                <label style={{fontSize:10,color:C.sub,display:"block",marginBottom:4}}>走者を選ぶ</label>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {ALL_PLAYERS.map(p=>{
                    const isReg=REG_PLAYERS.includes(p);const isSJ=SJ_PLAYERS.includes(p);
                    const dot=isReg?C.blue:isSJ?C.purple:C.accent;
                    const active=selPlayer===p;
                    return(<button key={p} onClick={()=>setSelPlayer(active?"":p)} style={{padding:"5px 8px",borderRadius:16,border:`1px solid ${active?dot+"88":C.border}`,cursor:"pointer",background:active?`${dot}33`:"rgba(255,255,255,0.04)",color:active?dot:C.sub,fontSize:11,fontWeight:active?800:500,display:"flex",alignItems:"center",gap:3}}>
                      <span style={{width:4,height:4,borderRadius:"50%",background:dot,display:"inline-block"}}/>{p}
                    </button>);
                  })}
                </div>
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>addSB("SB")} style={{flex:1,padding:"13px",borderRadius:10,border:`1px solid ${C.green}66`,cursor:"pointer",background:`${C.green}11`,color:C.green,fontSize:14,fontWeight:800,opacity:selPlayer?1:0.4}}>
                  🏃 盗塁成功 (SB)
                </button>
                <button onClick={()=>addSB("CS")} style={{flex:1,padding:"13px",borderRadius:10,border:"1px solid #E05A5A66",cursor:"pointer",background:"rgba(224,90,90,0.08)",color:"#E05A5A",fontSize:14,fontWeight:800,opacity:selPlayer?1:0.4}}>
                  ✋ 盗塁死 (CS)
                </button>
              </div>
              {!selPlayer&&<div style={{fontSize:10,color:C.dim,textAlign:"center",marginTop:6}}>↑ 走者を選んでから押してください</div>}
            </Card>

            {atbats.length>0&&<Card style={{background:"rgba(255,255,255,0.03)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <SL style={{margin:0}}>履歴（{atbats.length}打席）</SL>
                <button onClick={()=>setAtbats(p=>p.slice(0,-1))} style={{padding:"4px 10px",borderRadius:8,border:"1px solid #E05A5A44",cursor:"pointer",background:"rgba(224,90,90,0.08)",color:"#E05A5A",fontSize:11}}>↩ 取消</button>
              </div>
              {[...atbats].reverse().slice(0,6).map((ab,i)=>{
                const s=rts(ab.result);
                const rc=s.h>0?C.blue:ab.result==="BB"||ab.result==="HBP"?C.green:ab.result==="K"?"#E05A5A":C.dim;
                return(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<Math.min(atbats.length,6)-1?`1px solid ${C.border}`:"none"}}>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:12,fontWeight:700,color:C.text}}>{ab.order}番 {ab.player}</span>
                    {ab.risp&&<span style={{fontSize:9,color:C.green,background:"rgba(76,175,114,0.15)",borderRadius:4,padding:"1px 4px"}}>得点圏</span>}
                  </div>
                  <span style={{fontSize:14,fontWeight:900,color:rc}}>{ab.result}</span>
                </div>);
              })}
            </Card>}
          </>}
        </>}

        {mode==="summary"&&<>
          {atbats.length===0
            ? <div style={{textAlign:"center",padding:"40px 0",color:C.dim,fontSize:13}}>まだ打席が記録されていません</div>
            : <>
              <div style={{fontSize:12,color:C.sub,marginBottom:10}}>{gameDate} vs {gameOpp} {gameType}戦{gameNum}</div>
              {summary().map(({p,pa,ab,h,bb,k,hr,rbi,avg})=>(
                <Card key={p}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <span style={{fontSize:14,fontWeight:800,color:C.text}}>{p}</span>
                    <span style={{fontSize:20,fontWeight:900,color:h>0?C.blue:C.dim}}>{avg}</span>
                  </div>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,color:C.sub}}>{pa}打席 {h}/{ab}</span>
                    {hr>0&&<span style={{fontSize:11,color:C.gold}}>HR {hr}</span>}
                    {rbi>0&&<span style={{fontSize:11,color:C.accent}}>打点 {rbi}</span>}
                    {run>0&&<span style={{fontSize:11,color:C.green}}>得点 {run}</span>}
                    {bb>0&&<span style={{fontSize:11,color:C.green}}>BB {bb}</span>}
                    {k>0&&<span style={{fontSize:11,color:"#E05A5A"}}>K {k}</span>}
                  </div>
                </Card>
              ))}
              {sbLog.length>0&&<Card style={{background:"rgba(76,175,114,0.05)"}}>
                <SL color={C.green}>🏃 盗塁</SL>
                {sbLog.map((s,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:i<sbLog.length-1?`1px solid ${C.border}`:"none"}}>
                    <span style={{fontSize:12,color:C.text}}>{s.player}</span>
                    <span style={{fontSize:12,fontWeight:700,color:s.type==="SB"?C.green:"#E05A5A"}}>{s.type}</span>
                  </div>
                ))}
              </Card>}
            </>}
        </>}

        {mode==="export"&&<>
          <Card style={{marginBottom:12}}>
            <SL color={C.blue}>📋 スプレッドシート用テキスト</SL>
            <div style={{fontSize:11,color:C.sub,marginBottom:10,lineHeight:1.6}}>コピーしてスプレッドシートのA1セルに貼り付け</div>
            {atbats.length===0
              ? <div style={{color:C.dim,fontSize:12,textAlign:"center",padding:"20px 0"}}>打席データがありません</div>
              : <textarea readOnly value={exportText()} style={{width:"100%",background:"rgba(255,255,255,0.04)",border:`1px solid ${C.border}`,borderRadius:8,padding:"10px",color:C.sub,fontSize:10,fontFamily:"monospace",minHeight:160,resize:"none",outline:"none",boxSizing:"border-box"}}/>}
          </Card>
          <Card style={{background:"rgba(196,118,58,0.06)",border:`1px solid rgba(196,118,58,0.2)`}}>
            <SL color={C.accent}>📱 いない時の運用フロー</SL>
            <div style={{fontSize:12,color:C.sub,lineHeight:1.9}}>
              1️⃣ スコアラーがスプレッドシートに入力<br/>
              2️⃣ CSVをClaudeに送る<br/>
              3️⃣ アプリに自動反映
            </div>
          </Card>
        </>}

        {mode==="measure"&&<>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:10,color:C.sub,fontWeight:700,display:"block",marginBottom:4}}>選手</label>
            <select value={mform.player} onChange={e=>mf("player",e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 12px",color:mform.player?"#fff":C.sub,fontSize:14,outline:"none",appearance:"none",boxSizing:"border-box"}}>
              <option value="" style={{background:"#1A2332"}}>選手を選択</option>
              {ALL_PLAYERS.map(p=><option key={p} value={p} style={{background:"#1A2332"}}>{p}</option>)}
            </select>
          </div>
          <div style={{fontSize:10,color:C.accent,fontWeight:700,letterSpacing:2,marginBottom:8}}>🏏 ブラスト測定</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            {[["バットスピード (mph)","batSpeed",C.accent,"例:65"],["オンプレーン率 (%)","onPlane","#E8943A","例:80"],["パワー","power",C.purple,"例:70"],["バット角度 (°)","batAngle","#F4A460","例:15"]].map(([l,k,c,ph])=>(
              <div key={k}><label style={{fontSize:10,color:c,fontWeight:700,display:"block",marginBottom:4}}>{l}</label>
              <input type="number" value={mform[k]||""} onChange={e=>mf(k,e.target.value)} placeholder={ph} style={{...mns,fontSize:16,padding:"10px 4px",borderColor:c+"44"}}/></div>
            ))}
          </div>
          <div style={{fontSize:10,color:C.green,fontWeight:700,letterSpacing:2,marginBottom:8}}>🏃 ベースランニング</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            {[["駆け抜け(秒)","run1b","例:6.50"],["2塁打(秒)","run2b","例:8.20"],["3塁打(秒)","run3b","例:11.40"],["HR(秒)","runHR","例:13.80"]].map(([l,k,ph])=>(
              <div key={k}><label style={{fontSize:10,color:C.green,fontWeight:700,display:"block",marginBottom:4}}>{l}</label>
              <input type="number" step="0.01" value={mform[k]||""} onChange={e=>mf(k,e.target.value)} placeholder={ph} style={{...mns,fontSize:16,padding:"10px 4px",borderColor:C.green+"44"}}/></div>
            ))}
          </div>
          <div style={{fontSize:10,color:C.blue,fontWeight:700,letterSpacing:2,marginBottom:8}}>⚡ 投球速度</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            {[["マウンド (km/h)","pitchMound","例:85"],["プルダウン (km/h)","pitchPD","例:90"]].map(([l,k,ph])=>(
              <div key={k}><label style={{fontSize:10,color:C.blue,fontWeight:700,display:"block",marginBottom:4}}>{l}</label>
              <input type="number" value={mform[k]||""} onChange={e=>mf(k,e.target.value)} placeholder={ph} style={{...mns,fontSize:16,padding:"10px 4px",borderColor:C.blue+"44"}}/></div>
            ))}
          </div>
          <button onClick={()=>{if(mform.player){setSaved(true);setTimeout(()=>setSaved(false),2000);}}} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",cursor:"pointer",background:mform.player?`linear-gradient(135deg,${C.accent},${C.accentB})`:"rgba(255,255,255,0.07)",color:mform.player?"#fff":C.sub,fontSize:14,fontWeight:800}}>保存する</button>
        </>}
      </div>
    </div>
  );
}

export default function App(){
  const [tab,setTab]=useState("player");
  const [player,setPlayer]=useState(ALL_PLAYERS[0]);
  const tabs=[{id:"player",icon:"👤",l:"個人"},{id:"team",icon:"⚾",l:"チーム"},{id:"pitch",icon:"🔥",l:"投手"},{id:"week",icon:"📅",l:"平日"},{id:"input",icon:"✏️",l:"入力"}];

  return(
    <div style={{background:C.bg,minHeight:"100vh",
      fontFamily:"'Noto Sans JP',-apple-system,BlinkMacSystemFont,sans-serif",
      color:"#fff",width:"100%",margin:"0 auto",position:"relative"}}>
      <style>{`
        *{box-sizing:border-box}
        @keyframes fadeOut{0%{opacity:1}65%{opacity:1}100%{opacity:0}}
        ::-webkit-scrollbar{width:3px;height:3px}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
        select option{background:#1A2332;color:#fff}
        input::placeholder,textarea::placeholder{color:#3A4A5A}
        input[type="number"]::-webkit-inner-spin-button{opacity:0.4}
      `}</style>

      {tab==="player"&&(
        <div style={{padding:"7px 12px 6px",background:C.bg,borderBottom:`1px solid rgba(255,255,255,0.05)`,display:"flex",gap:5,overflowX:"auto"}}>
          {ALL_PLAYERS.map(p=>{
            const isReg = REG_PLAYERS.includes(p);
            const isSJ  = SJ_PLAYERS.includes(p);
            const dotColor = isReg ? C.blue : isSJ ? C.purple : C.accent;
            return(
              <button key={p} onClick={()=>setPlayer(p)} style={{
                flexShrink:0,padding:"4px 10px",borderRadius:20,border:"none",cursor:"pointer",
                background:player===p?"rgba(196,118,58,0.2)":"rgba(255,255,255,0.05)",
                color:player===p?C.accent:C.sub,fontSize:12,fontWeight:player===p?800:500,
                border:player===p?`1px solid rgba(196,118,58,0.45)`:`1px solid ${C.border}`,
                display:"flex",alignItems:"center",gap:4,
              }}>
                <span style={{width:5,height:5,borderRadius:"50%",background:dotColor,flexShrink:0,display:"inline-block"}}/>
                {p}
              </button>
            );
          })}
        </div>
      )}

      <div style={{overflowY:"auto",height:`calc(100vh - ${tab==="player"?106:60}px)`}}>
        {tab==="player"&&<PlayerPage player={player}/>}
        {tab==="team"&&<TeamPage/>}
        {tab==="pitch"&&<PitchPage/>}
        {tab==="week"&&<WeekPage/>}
        {tab==="input"&&<InputPage/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
        width:"100%",background:"rgba(11,21,32,0.97)",backdropFilter:"blur(16px)",
        borderTop:`1px solid ${C.border}`,display:"grid",gridTemplateColumns:"repeat(5,1fr)",height:60,zIndex:40}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
            gap:2,border:"none",background:"transparent",cursor:"pointer",
            color:tab===t.id?C.accent:C.dim,transition:"color 0.15s",position:"relative"}}>
            <span style={{fontSize:20}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:tab===t.id?700:500}}>{t.l}</span>
            {tab===t.id&&<div style={{position:"absolute",bottom:0,width:26,height:2,background:C.accent,borderRadius:"2px 2px 0 0"}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
  </script>
</body>
</html>
