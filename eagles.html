// opponentフィールドに日付が含まれている場合（例: "2025/4/13 明日香ヤング"）に
// date・month・numを自動付与してopponentを正規化
function enrichRecords(records) {
  return records.map(r => {
    const parsed = parseGameId(r.opponent);
    // 日付付きの試合IDの場合のみopponent/gameTypeを上書き
    // 日付なし（既存データ）の場合はopponentをそのまま保持
    if(parsed.date) {
      return {
        ...r,
        opponent: parsed.opponent + (parsed.num || ""),
        gameType: parsed.gameType,
        date: parsed.date,
        month: parsed.month,
        num: parsed.num,
      };
    } else {
      // 既存データ：opponentはそのまま、dateも元のまま保持
      return {
        ...r,
        date: r.date || null,
        month: r.month || null,
        num: "",
      };
    }
  });
}

// 選手ごとの盗塁集計
function getSBStats(player) {
  const rows = ALL_SB_LOG.filter(r => r.player === player);
  const sb = rows.reduce((s,r)=>s+r.sb, 0);
  const cs = rows.reduce((s,r)=>s+r.cs, 0);
  const pct = (sb+cs)>0 ? Math.round(sb/(sb+cs)*100) : null;
  return { sb, cs, pct, attempts: sb+cs };
}

function getSBByGame(player) {
  const games = [...new Set(ALL_SB_LOG.filter(r=>r.player===player).map(r=>r.opponent))];
  return games.map(g => {
    const rows = ALL_SB_LOG.filter(r=>r.player===player && r.opponent===g);
    return { g, sb: rows.reduce((s,r)=>s+r.sb,0), cs: rows.reduce((s,r)=>s+r.cs,0) };
  });
}

function getTeamSBRanking() {
  const players = [...new Set(ALL_SB_LOG.map(r=>r.player))];
  return players.map(p => {
    const s = getSBStats(p);
    return { player: p, ...s };
  }).sort((a,b) => b.sb - a.sb);
}

// ─── 計算 ────────────────────────────────────────────────────
// 試合IDから日付・対戦相手・種別を抽出
// 例: "2025/4/13 明日香ヤング OP戦①" → {date:"2025/4/13", opponent:"明日香ヤング", gameType:"OP", num:"①"}
function parseGameId(gameId) {
  if(!gameId) return {date:null, opponent:gameId, gameType:"OP", num:""};
  const dateM = gameId.match(/^(\d{4}\/\d{1,2}\/\d{1,2})\s*/);
  const date = dateM ? dateM[1] : null;
  const rest = date ? gameId.slice(dateM[0].length) : gameId;
  const gt = rest.includes("公式") ? "公式" : "OP";
  const num = rest.match(/[①②③④⑤]/)?.[0] || "";
  const opp = rest.replace(/\s*(OP戦|公式戦)[①②③④⑤]?/g,"").replace(/[①②③④⑤]/g,"").trim();
  const month = date ? parseInt(date.split("/")[1]) : null;
  return {date, opponent:opp, gameType:gt, num, month};
}
// 月別成績集計
function calcMonthlyStats(records) {
  const months = {};
  records.forEach(r => {
    const m = r.month;
    if(!m) return;
    if(!months[m]) months[m] = [];
    months[m].push(r);
  });
  return Object.entries(months)
    .sort(([a],[b])=>parseInt(a)-parseInt(b))
    .map(([month, rows]) => ({
      month: parseInt(month),
      label: `${month}月`,
      stats: calcStats(rows),
      games: new Set(rows.map(r=>r.opponent+r.gameType+(r.num||""))).size,
    }));
}

function calcStats(rows) {
  const t={pa:0,ab:0,h:0,single:0,d2:0,d3:0,hr:0,bb:0,hbp:0,sf:0,sh:0,k:0,rbi:0,r:0};
  rows.forEach(r=>{ Object.keys(t).forEach(k=>{ t[k]+=r[k]||0; }); });
  const avg=t.ab>0?t.h/t.ab:0;
  const obpD=t.ab+t.bb+t.hbp+t.sf;
  const obp=obpD>0?(t.h+t.bb+t.hbp)/obpD:0;
  const tb=t.single+t.d2*2+t.d3*3+t.hr*4;
  const slg=t.ab>0?tb/t.ab:0;
  const fmt=n=>n===0?".000":n.toFixed(3).replace(/^0/,"");
  return {...t,tb,avg:fmt(avg),obp:fmt(obp),slg:fmt(slg),ops:fmt(obp+slg),
    avgN:avg,obpN:obp,slgN:slg,opsN:obp+slg,
    games:new Set(rows.map(r=>(r.date||"no-date")+"|"+r.opponent+"|"+(r.team||""))).size};
}

// ─── スパークラインSVG ────────────────────────────────────────
function Spark({data,color,invert=false,h=56,showDots=true}){
  if(!data||data.length<2) return null;
  const w=260,pad=8;
  const vals=data.map(d=>d.v);
  const mn=Math.min(...vals),mx=Math.max(...vals),range=mx-mn||1;
  const toY=v=>pad+((invert?v-mn:mx-v)/range)*(h-pad*2);
  const toX=i=>pad+(i/(data.length-1))*(w-pad*2);
  const pts=vals.map((v,i)=>`${toX(i)},${toY(v)}`).join(" ");
  // moving avg
  const ma=vals.map((_,i)=>{const s=vals.slice(Math.max(0,i-2),i+1);return s.reduce((a,b)=>a+b,0)/s.length;});
  const maPts=ma.map((v,i)=>`${toX(i)},${toY(v)}`).join(" ");
  const bestY=toY(invert?mn:mx);
  return(
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:h}}>
      <line x1={pad} y1={bestY} x2={w-pad} y2={bestY} stroke={color} strokeWidth="1" strokeDasharray="3 3" opacity="0.3"/>
      <polyline fill="none" stroke={color} strokeWidth="1.5" opacity="0.25" points={pts}/>
      <polyline fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" points={maPts}/>
      {showDots&&vals.map((v,i)=>(
        <circle key={i} cx={toX(i)} cy={toY(v)} r={i===vals.length-1?5:3}
          fill={i===vals.length-1?color:"#0B1520"} stroke={color} strokeWidth="1.5"/>
      ))}
    </svg>
  );
}

function MiniBar({data,color,height=36}){
  const max=Math.max(...data.map(d=>d.v),0.001);
  return(
    <div style={{display:"flex",gap:3,alignItems:"flex-end",height:height+24}}>
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div style={{fontSize:8,color,fontWeight:700,lineHeight:1}}>{d.v>0?d.v:""}</div>
          <div style={{width:"100%",background:`${color}bb`,borderRadius:"2px 2px 0 0",
            height:Math.max((d.v/max)*height,2),transition:"height 0.5s ease"}}/>
          <div style={{fontSize:8,color:C.dim,lineHeight:1,textAlign:"center"}}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}

// ─── 前回差バッジ ────────────────────────────────────────────
function Diff({cur,prev,invert=false,unit=""}){
  const d=cur-prev,up=invert?d<0:d>0,neutral=d===0;
  const disp=(d>0?"+":"")+d.toFixed(Math.abs(d)<10&&d%1!==0?2:0)+unit;
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:2,fontSize:11,fontWeight:700,
      color:neutral?C.sub:up?"#4CAF72":"#E05A5A",
      background:neutral?"rgba(122,138,154,0.12)":up?"rgba(76,175,114,0.15)":"rgba(224,90,90,0.15)",
      borderRadius:6,padding:"2px 7px"}}>
      {!neutral&&<span style={{fontSize:9}}>{up?"▲":"▼"}</span>}
      {neutral?"±0":disp}
    </span>
  );
}

// ─── ベストプログレス ─────────────────────────────────────────
function BestBar({cur,best,label,unit,invert=false,isNew}){
  const ratio=invert?best===0?100:Math.min(100,(best/cur)*100):best===0?100:Math.min(100,(cur/best)*100);
  return(
    <div style={{marginBottom:8}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{fontSize:11,color:C.sub}}>{label}</span>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {isNew&&<span style={{fontSize:9,fontWeight:800,color:C.gold,background:"rgba(255,215,0,0.12)",
            border:"1px solid rgba(255,215,0,0.35)",borderRadius:4,padding:"1px 6px"}}>★ PB</span>}
          <span style={{fontSize:11,color:C.sub}}>{cur}{unit} / 最高{best}{unit}</span>
          <span style={{fontSize:11,fontWeight:700,color:C.green}}>{ratio.toFixed(0)}%</span>
        </div>
      </div>
      <div style={{height:5,background:"rgba(255,255,255,0.07)",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${ratio}%`,borderRadius:3,transition:"width 0.8s ease",
          background:isNew?`linear-gradient(90deg,${C.gold},#FF8C00)`:
            ratio>=95?`linear-gradient(90deg,${C.green},#2E8B57)`:
            ratio>=80?`linear-gradient(90deg,${C.accent},${C.accentB})`:
            `linear-gradient(90deg,${C.blue},#4A7DE0)`}}/>
      </div>
    </div>
  );
}

  const rows = filteredRows;

  const allPlayerStatsGlobal=[...new Set(ALL_RECORDS.filter(r=>
    (teamFilter==="合計"||r.team===teamFilter)&&(typeFilter==="合計"||r.gameType===typeFilter)

    p, s:calcStats(ALL_RECORDS.filter(r=>r.player===p&&(teamFilter==="合計"||r.team===teamFilter)&&(typeFilter==="合計"||r.gameType===typeFilter)))

  const rankOfG=(arr,fn,asc=false)=>{
    const sorted=[...arr].sort((a,b)=>asc?fn(a)-fn(b):fn(b)-fn(a));
    const i=sorted.findIndex(x=>x.p===player);
    return i>=0?i+1:null;
  };
  const ss={
    avg:season.avgN, obp:season.obpN, slg:season.slgN, ops:season.opsN,
    kp:season.pa>0?season.k/season.pa*100:0,
    bbp:season.pa>0?season.bb/season.pa*100:0,
    rankAVG:season.pa>0?rankOfG(allPlayerStatsGlobal,x=>x.s.avgN):null,
    rankOPS:season.pa>0?rankOfG(allPlayerStatsGlobal,x=>x.s.opsN):null,
    rankOBP:season.pa>0?rankOfG(allPlayerStatsGlobal,x=>x.s.obpN):null,
    rankSLG:season.pa>0?rankOfG(allPlayerStatsGlobal,x=>x.s.slgN):null,
    rankRBI:season.pa>0?rankOfG(allPlayerStatsGlobal,x=>x.s.rbi):null,
    rankR:season.pa>0?rankOfG(allPlayerStatsGlobal,x=>x.s.r):null,
    rankK:season.pa>0?rankOfG(allPlayerStatsGlobal,x=>x.s.k/Math.max(x.s.pa,1),true):null,
    rankBB:season.pa>0?rankOfG(allPlayerStatsGlobal,x=>x.s.bb/Math.max(x.s.pa,1),false):null,

  const sbStats=getSBStats(player);

    batSpeed:swingEntry?swingEntry.avg:null,
    batSpeedMax:swingEntry?swingEntry.max:null,
    pitchMound:pitchEntry?pitchEntry.mound:null,
    pitchPD:pitchEntry?pitchEntry.pd:null,
    run1b:baserunEntry?baserunEntry.dash:null,
    run2b:baserunEntry?baserunEntry.d2:null,
    run3b:baserunEntry?baserunEntry.d3:null,
    runHR:baserunEntry?baserunEntry.hr:null,
    date:pitchEntry?.date||baserunEntry?.date||null,

          {/* 対左右投手 */}
          {VS_LR_STATS[player]&&(()=>{
            const lr=VS_LR_STATS[player];
            return(
              <Card>
                <SL>⚡ 対右投手 vs 対左投手</SL>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                  {[
                    {label:"対右投手",pa:lr.rPA,avg:lr.rAVG,ops:lr.rOPS,h:lr.rH,color:C.blue},
                    {label:"対左投手",pa:lr.lPA,avg:lr.lAVG,ops:lr.lOPS,h:lr.lH,color:C.purple},
                  ].map(m=>(
                    <div key={m.label} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 12px",border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:10,color:m.color,fontWeight:700,marginBottom:6}}>{m.label}</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:4}}>
                        <div><div style={{fontSize:8,color:C.dim}}>打率</div><div style={{fontSize:18,fontWeight:900,color:m.color}}>{m.avg>0?m.avg.toFixed(3).replace(/^0/,""):".000"}</div></div>
                        <div><div style={{fontSize:8,color:C.dim}}>OPS</div><div style={{fontSize:18,fontWeight:900,color:m.color}}>{m.ops>0?m.ops.toFixed(3).replace(/^0/,""):".000"}</div></div>
                      </div>
                      <div style={{fontSize:10,color:C.dim}}>{m.pa}打席 · {m.h}安打</div>
                    </div>
                  ))}
                </div>
                {lr.rPA>0&&lr.lPA>3&&(
                  <div style={{padding:"7px 10px",background:"rgba(255,255,255,0.03)",borderRadius:8,fontSize:11,color:C.sub}}>
                    {lr.rOPS>lr.lOPS
                      ? `💡 対右が得意（OPS差+${(lr.rOPS-lr.lOPS).toFixed(3)}）。左投手対策を強化しよう。`
                      : `💡 対左が得意（OPS差+${(lr.lOPS-lr.rOPS).toFixed(3)}）。右投手対策を意識しよう。`}
                  </div>
                )}
              </Card>
            );
          })()}

          {/* 得点圏（RISP） */}
          {RISP_STATS[player]&&(()=>{
            // チームフィルターに応じたRISPデータを取得
            const rispMap=teamFilter==="ジュニア"?RISP_JR:teamFilter==="レギュラー"?RISP_REG:teamFilter==="スーパーJr"||teamFilter==="スーパージュニア"?RISP_SJ:RISP_STATS;
            const risp=rispMap[player]||{pa:0,ab:0,h:0,avg:0,ops:0,rbi:0};
            // ss: グローバル定義済み
            return(
              <Card style={{background:"rgba(76,175,114,0.05)",border:`1px solid rgba(76,175,114,0.18)`}}>
                <SL color={C.green}>🎯 得点圏（RISP）成績</SL>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:8}}>
                  <StatBox label="得点圏打率" value={risp.avg>0?risp.avg.toFixed(3).replace(/^0/,""):".000"} color={C.green}/>
                  <StatBox label="得点圏OPS"  value={risp.ops>0?risp.ops.toFixed(3).replace(/^0/,""):".000"} color={C.accent}/>
                  <StatBox label="得点圏打点" value={risp.rbi} color={C.green} sub="RBI"/>
                </div>
                <div style={{fontSize:10,color:C.sub,marginBottom:6}}>{risp.pa}打席 · {risp.ab}打数 · {risp.h}安打</div>
                {ss&&risp.avg>0&&ss.avg>0&&(
                  <div style={{padding:"7px 10px",borderRadius:8,fontSize:11,
                    background:risp.avg>=ss.avg?"rgba(76,175,114,0.1)":"rgba(224,90,90,0.08)",
                    color:risp.avg>=ss.avg?C.green:"#E05A5A"}}>
                    {risp.avg>=ss.avg
                      ? `✅ 得点圏で打率+${(risp.avg-ss.avg).toFixed(3)}。勝負強い！`
                      : `⚠️ 得点圏で打率-${(ss.avg-risp.avg).toFixed(3)}。チャンスでの集中力が課題。`}
                  </div>
                )}
              </Card>
            );
          })()}
        </>}

        {/* ── 🔍 詳細分析（スプレッドシート実データ） ── */}
        {sub==="analysis"&&(()=>{
          // 全て動的計算（rows = チームフィルター済み）
          // lr: チームフィルターに応じてVS_LR_STATSから取得（フォーマット統一）
          const lrRaw = teamFilter==="ジュニア"?VS_LR_STATS[player]
            :teamFilter==="レギュラー"?REG_VS_LR_STATS[player]||null
            :(teamFilter||"").includes("SJ")||teamFilter==="スーパージュニア"||teamFilter==="スーパーJr"?SJ_VS_LR_STATS[player]||null
            :VS_LR_STATS[player];
          const lr = lrRaw?{
            rPA:lrRaw.rPA||null, rAB:lrRaw.rAB||null, rH:lrRaw.rH||null,
            rAVG:lrRaw.rAVG||0, rOPS:lrRaw.rOPS||0,
            lPA:lrRaw.lPA||null, lAB:lrRaw.lAB||null, lH:lrRaw.lH||null,
            lAVG:lrRaw.lAVG||0, lOPS:lrRaw.lOPS||0,
          }:null;
          // risp: チームフィルター対応
          const rispMap2=teamFilter==="ジュニア"?RISP_JR:teamFilter==="レギュラー"?RISP_REG
            :(teamFilter||"").includes("SJ")||teamFilter==="スーパージュニア"||teamFilter==="スーパーJr"?RISP_SJ:RISP_STATS;
          const risp=rispMap2[player]||null;
          // このカテゴリーでの出場データなし
          if(season.pa===0) return(
            <div style={{textAlign:"center",padding:"40px 20px",color:C.sub}}>
              <div style={{fontSize:32,marginBottom:8}}>📊</div>
              <div style={{fontSize:14}}>詳細分析データがありません</div>
            </div>
          );
          return(<>
            {/* 部門順位バッジ */}
            <SL color={C.gold}>🏅 部門別チーム順位</SL>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
              {[
                {label:"打率",rank:ss.rankAVG,color:C.blue},
                {label:"OPS",rank:ss.rankOPS,color:C.accent},
                {label:"出塁率",rank:ss.rankOBP,color:C.green},
                {label:"長打率",rank:ss.rankSLG,color:C.purple},
                {label:"打点",rank:ss.rankRBI,color:"#E8943A"},
                {label:"得点",rank:ss.rankR,color:C.blue},
                {label:"K%",rank:ss.rankK,color:"#E05A5A"},
                {label:"BB%",rank:ss.rankBB,color:C.green},
              ].filter(x=>x.rank!=null).map(x=>(
                <div key={x.label} style={{
                  display:"flex",alignItems:"center",gap:5,
                  background:x.rank<=3?`rgba(255,215,0,0.12)`:`rgba(255,255,255,0.04)`,
                  border:`1px solid ${x.rank<=3?"rgba(255,215,0,0.35)":C.border}`,
                  borderRadius:10,padding:"6px 10px",
                }}>
                  <div style={{fontSize:10,color:C.sub}}>{x.label}</div>
                  <div style={{
                    width:22,height:22,borderRadius:"50%",
                    background:x.rank===1?`linear-gradient(135deg,${C.gold},#FF8C00)`:x.rank===2?"rgba(192,192,210,0.4)":x.rank===3?"rgba(196,118,58,0.5)":"rgba(255,255,255,0.1)",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:11,fontWeight:900,color:x.rank<=3?"#fff":C.sub,
                  }}>{x.rank}</div>
                </div>
              ))}
            </div>

            {/* 三振率・四球率 */}
            <Card>
              <SL>K% / BB% 傾向</SL>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[
                  {label:"三振率 (K%)",val:season.pa>0?Math.round(season.k/season.pa*100):0,color:"#E05A5A",good:season.pa>0&&season.k/season.pa*100<10,note:season.pa>0&&season.k/season.pa*100<10?"✅ 低三振":"⚠️ 改善余地あり"},
                  {label:"四球率 (BB%)",val:season.pa>0?Math.round(season.bb/season.pa*100):0,color:C.green,good:season.pa>0&&season.bb/season.pa*100>15,note:season.pa>0&&season.bb/season.pa*100>15?"✅ 高選球眼":"選球眼向上を"},
                ].map(m=>(
                  <div key={m.label} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 12px",border:`1px solid ${C.border}`}}>
                    <div style={{fontSize:9,color:C.sub,marginBottom:4}}>{m.label}</div>
                    <div style={{fontSize:22,fontWeight:900,color:m.color,lineHeight:1,marginBottom:4}}>{m.val.toFixed(1)}%</div>
                    <div style={{fontSize:10,color:m.good?C.green:C.sub}}>{m.note}</div>
                    <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden",marginTop:6}}>
                      <div style={{height:"100%",width:`${Math.min(m.val,50)*2}%`,background:m.color,borderRadius:2}}/>
                    </div>
                  </div>
                ))}
              </div>
            </Card>

            {/* 対左右投手 */}
            {lr&&<Card>
              <SL>対右投手 vs 対左投手</SL>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                {[
                  {label:"対右投手",pa:lr.rPA,ab:lr.rAB,h:lr.rH,avg:lr.rAVG,ops:lr.rOPS,color:C.blue,hasPAB:lr.rPA!=null},
                  {label:"対左投手",pa:lr.lPA,ab:lr.lAB,h:lr.lH,avg:lr.lAVG,ops:lr.lOPS,color:C.purple,hasPAB:lr.lPA!=null},
                ].map(m=>(
                  <div key={m.label} style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px 12px",border:`1px solid ${C.border}`}}>
                    <div style={{fontSize:10,color:C.sub,marginBottom:6}}>{m.label}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>
                      <div>
                        <div style={{fontSize:8,color:C.dim}}>打率</div>
                        <div style={{fontSize:18,fontWeight:900,color:m.color}}>{m.avg.toFixed(3).replace(/^0/,"")}</div>
                      </div>
                      <div>
                        <div style={{fontSize:8,color:C.dim}}>OPS</div>
                        <div style={{fontSize:18,fontWeight:900,color:m.color}}>{m.ops.toFixed(3).replace(/^0/,"")}</div>
                      </div>
                    </div>
                    <div style={{fontSize:10,color:C.dim,marginTop:4}}>{m.pa}打席 / {m.h}安打</div>
                  </div>
                ))}
              </div>
              {lr.rPA>0&&lr.lPA>0&&(
                <div style={{padding:"8px 10px",background:"rgba(255,255,255,0.03)",borderRadius:8,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:11,color:C.sub,lineHeight:1.7}}>
                    {lr.rOPS>lr.lOPS
                      ? `💡 対右投手が得意（OPS差 +${(lr.rOPS-lr.lOPS).toFixed(3)}）。左投手対策を強化しよう。`
                      : `💡 対左投手が得意（OPS差 +${(lr.lOPS-lr.rOPS).toFixed(3)}）。右投手対策を意識しよう。`}
                  </div>
                </div>
              )}
            </Card>}

            {/* 得点圏 RISP */}
            {risp&&<Card>
              <SL color={C.green}>🎯 得点圏（RISP）成績</SL>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
                <StatBox label="得点圏打率" value={risp.avg>0?risp.avg.toFixed(3).replace(/^0/,""):".000"} color={C.green}/>
                <StatBox label="得点圏OPS"  value={risp.ops>0?risp.ops.toFixed(3).replace(/^0/,""):".000"} color={C.accent}/>
                <StatBox label="得点圏打点" value={risp.rbi} color={C.green} sub="RBI"/>
              </div>
              <div style={{fontSize:10,color:C.sub,marginBottom:6}}>{risp.pa}打席 · {risp.ab}打数 · {risp.h}安打</div>
              {ss.avg>0&&risp.avg>0&&(
                <div style={{padding:"8px 10px",background:risp.avg>ss.avg?"rgba(76,175,114,0.1)":"rgba(224,90,90,0.08)",borderRadius:8,border:`1px solid ${risp.avg>ss.avg?"rgba(76,175,114,0.3)":"rgba(224,90,90,0.25)"}`}}>
                  <div style={{fontSize:11,color:risp.avg>ss.avg?C.green:"#E05A5A",lineHeight:1.7}}>
                    {risp.avg>ss.avg
                      ? `✅ 得点圏で通常より打率+${(risp.avg-ss.avg).toFixed(3)}。勝負強い！`
                      : `⚠️ 得点圏での打率が通常比-${(ss.avg-risp.avg).toFixed(3)}。得点圏での集中力が課題。`}
                  </div>
                </div>
              )}
            </Card>}
          </>);
        })()}

        {/* ── 📊 測定値 ── */}
        {sub==="measure"&&<>
          {!swingEntry&&!pitchEntry&&!baserunEntry?(
            <div style={{textAlign:"center",padding:"40px 20px",color:C.sub}}>
              <div style={{fontSize:32,marginBottom:8}}>📋</div>
              <div style={{fontSize:14}}>この選手の測定データはまだありません</div>
            </div>
          ):<>
            <div style={{fontSize:11,color:C.sub,marginBottom:10}}>最終測定：{latest.date}</div>

            {/* ══ ブラスト ══ */}
            <div style={{background:`linear-gradient(135deg,rgba(196,118,58,0.12),rgba(232,148,58,0.05))`,borderRadius:14,padding:"13px",marginBottom:10,border:`1px solid rgba(196,118,58,0.25)`}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:16}}>🏏</span>
                <div style={{fontSize:12,fontWeight:800,color:C.accent,letterSpacing:1}}>BLAST MOTION</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10}}>
                {[
                  {l:"スイング平均",v:latest.batSpeed,u:"km/h",prev:null,c:C.accent,best:bestBlast},
                  {l:"スイングMAX",v:latest.batSpeedMax,u:"km/h",prev:null,c:"#E8943A",best:bestBlast},
                  {l:"マウンド球速",v:latest.pitchMound,u:"km/h",prev:null,c:C.purple,best:bestSpeed},
                  {l:"プルダウン球速",v:latest.pitchPD,u:"km/h",prev:null,c:"#F4A460",best:bestSpeed},
                ].map(m=>(
                  <div key={m.l} style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"10px",border:`1px solid rgba(196,118,58,0.15)`}}>
                    <div style={{fontSize:9,color:C.sub,marginBottom:3}}>{m.l}</div>
                    <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:4}}>
                      <span style={{fontSize:20,fontWeight:900,color:m.c,lineHeight:1}}>{m.v}</span>
                      <span style={{fontSize:9,color:C.dim}}>{m.u}</span>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      {m.prev!=null&&<Diff cur={m.v} prev={m.prev}/>}
                      <span style={{fontSize:9,color:C.dim}}>最高{m.best}{m.u}</span>
                    </div>
                    <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden",marginTop:5}}>
                      <div style={{height:"100%",width:`${Math.min((m.v/m.best)*100,100)}%`,background:m.c,borderRadius:2,transition:"width 0.8s"}}/>
                    </div>
                  </div>
                ))}
              </div>
              {/* バットスピード推移 */}
              <div style={{fontSize:9,color:C.sub,marginBottom:4,letterSpacing:1}}>バットスピード推移</div>
              <Spark data={(swingEntry?.history||[]).filter(h=>h.avg).map(d=>({v:d.avg}))} color={C.accent} h={42}/>
            </div>

            {/* ══ ベースランニング ══ */}
            <div style={{background:`linear-gradient(135deg,rgba(76,175,114,0.10),rgba(46,139,87,0.05))`,borderRadius:14,padding:"13px",marginBottom:10,border:`1px solid rgba(76,175,114,0.22)`}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:16}}>🏃</span>
                <div style={{fontSize:12,fontWeight:800,color:C.green,letterSpacing:1}}>BASE RUNNING</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10}}>
                {[
                  {l:"駆け抜け（1塁）",key:"run1b",best:baserunEntry?baserunEntry.dash:0,inv:true},
                  {l:"2塁打",         key:"run2b",best:baserunEntry?baserunEntry.d2:0,inv:true},
                  {l:"3塁打",         key:"run3b",best:baserunEntry?baserunEntry.d3:0,inv:true},
                  {l:"ホームラン",    key:"runHR",best:baserunEntry?baserunEntry.hr:0,inv:true},
                ].map(m=>{
                  const cur=latest[m.key];
                  const p2=prev2?.[m.key];
                  const ratio=m.inv?Math.min((m.best/cur)*100,100):Math.min((cur/m.best)*100,100);
                  return(
                    <div key={m.l} style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"10px",border:`1px solid rgba(76,175,114,0.15)`}}>
                      <div style={{fontSize:9,color:C.sub,marginBottom:3}}>{m.l}</div>
                      <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:4}}>
                        <span style={{fontSize:20,fontWeight:900,color:C.green,lineHeight:1}}>{cur}</span>
                        <span style={{fontSize:9,color:C.dim}}>秒</span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        {p2!=null&&<Diff cur={cur} prev={p2} invert/>}
                        <span style={{fontSize:9,color:C.dim}}>最速{m.best}秒</span>
                      </div>
                      <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden",marginTop:5}}>
                        <div style={{height:"100%",width:`${ratio}%`,background:C.green,borderRadius:2,transition:"width 0.8s"}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
              {/* 駆け抜け推移 */}
              <div style={{fontSize:9,color:C.sub,marginBottom:4,letterSpacing:1}}>駆け抜け（1塁）推移</div>
              <Spark data={baserunEntry?[{v:baserunEntry.dash}]:[]} color={C.green} invert h={42}/>
            </div>

            {/* ══ 投球速度 ══ */}
            <div style={{background:`linear-gradient(135deg,rgba(91,141,239,0.10),rgba(74,122,214,0.05))`,borderRadius:14,padding:"13px",marginBottom:10,border:`1px solid rgba(91,141,239,0.22)`}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:16}}>⚡</span>
                <div style={{fontSize:12,fontWeight:800,color:C.blue,letterSpacing:1}}>PITCHING SPEED</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10}}>
                {[
                  {l:"マウンド",key:"pitchMound",c:C.blue,best:bestSpeed},
                  {l:"プルダウン",key:"pitchPD",c:"#7B68EE",best:bestSpeed},
                ].map(m=>{
                  const cur=latest[m.key];
                  const p2=prev2?.[m.key];
                  const hasPrev=mh.some(d=>d[m.key]!=null);
                  return(
                    <div key={m.l} style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"10px",border:`1px solid rgba(91,141,239,0.15)`}}>
                      <div style={{fontSize:9,color:C.sub,marginBottom:3}}>{m.l}</div>
                      {cur!=null?(
                        <>
                          <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:4}}>
                            <span style={{fontSize:20,fontWeight:900,color:m.c,lineHeight:1}}>{cur}</span>
                            <span style={{fontSize:9,color:C.dim}}>km/h</span>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            {p2!=null&&<Diff cur={cur} prev={p2}/>}
                            {m.best>0&&<span style={{fontSize:9,color:C.dim}}>最速{m.best}km/h</span>}
                          </div>
                          {m.best>0&&<div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden",marginTop:5}}>
                            <div style={{height:"100%",width:`${Math.min((cur/m.best)*100,100)}%`,background:m.c,borderRadius:2}}/>
                          </div>}
                        </>
                      ):(
                        <div style={{fontSize:12,color:C.dim,marginTop:4}}>未測定</div>
                      )}
                    </div>
                  );
                })}
              </div>
              {/* マウンド推移（データある場合のみ） */}
              {mh.some(d=>d.pitchMound!=null)&&<>
                <div style={{fontSize:9,color:C.sub,marginBottom:4,letterSpacing:1}}>マウンド球速推移</div>
                <Spark data={mh.filter(d=>d.pitchMound!=null).map(d=>({v:d.pitchMound}))} color={C.blue} h={42}/>
              </>}
              {!mh.some(d=>d.pitchMound!=null)&&(
                <div style={{textAlign:"center",padding:"10px",color:C.dim,fontSize:11}}>
                  投球データを入力すると推移グラフが表示されます
                </div>
              )}
            </div>

            {/* ══ 自己ベスト到達率 ══ */}
            <Card>
              <SL>自己ベスト到達率</SL>
              <BestBar cur={latest.batSpeed} best={Math.max(...mh.map(d=>d.batSpeed))} label="バットスピード" unit="mph"/>
              <BestBar cur={latest.onPlane}  best={Math.max(...mh.map(d=>d.onPlane))}  label="オンプレーン率" unit="%"/>
              <BestBar cur={latest.power}    best={Math.max(...mh.map(d=>d.power))}    label="パワー" unit=""/>
              <BestBar cur={latest.run1b}    best={Math.min(...mh.map(d=>d.run1b))}    label="駆け抜け" unit="秒" invert isNew={latest.run1b<=Math.min(...mh.map(d=>d.run1b))}/>
              {latest.pitchMound&&<BestBar cur={latest.pitchMound} best={Math.max(...mh.filter(d=>d.pitchMound).map(d=>d.pitchMound))} label="マウンド" unit="km/h" isNew={latest.pitchMound>=Math.max(...mh.filter(d=>d.pitchMound).map(d=>d.pitchMound))}/>}
            </Card>

            {/* ══ シーズン成長まとめ ══ */}
            <Card>
              <SL>シーズン成長（開始比）</SL>
              {[
                {l:"バットスピード",diff:latest.batSpeed-mh[0].batSpeed,u:"mph"},
                {l:"オンプレーン率",diff:latest.onPlane-mh[0].onPlane,u:"%"},
                {l:"パワー",diff:latest.power-mh[0].power,u:""},
                {l:"駆け抜け",diff:mh[0].run1b-latest.run1b,u:"秒短縮"},
                {l:"2塁打",diff:mh[0].run2b-latest.run2b,u:"秒短縮"},
                ...(latest.pitchMound&&mh[0].pitchMound?[{l:"マウンド球速",diff:latest.pitchMound-mh[0].pitchMound,u:"km/h"}]:[]),
              ].map((s,i)=>(
                <div key={s.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  padding:"7px 0",borderBottom:i<5?`1px solid ${C.border}`:"none"}}>
                  <span style={{fontSize:12,color:C.sub}}>{s.l}</span>
                  <span style={{fontSize:13,fontWeight:700,color:s.diff>0?C.green:s.diff<0?"#E05A5A":C.dim}}>
                    {s.diff>0?"▲+":"▼"}{Math.abs(s.diff).toFixed(s.u.includes("秒")?2:0)}{s.u}
                  </span>
                </div>
              ))}
            </Card>
          </>}
        </>}

        {/* ── 📈 成長分析（測定×試合成績） ── */}
        {sub==="growth"&&<>
          {(!mh.length||rows.length<2)?(
            <div style={{textAlign:"center",padding:"40px 20px",color:C.sub}}>
              <div style={{fontSize:32,marginBottom:8}}>📈</div>
              <div style={{fontSize:14}}>試合データと測定データが揃うと分析できます</div>
            </div>
          ):<>
            <SL color={C.accentB}>⚡ 練習→試合 成長連携</SL>
            <div style={{fontSize:11,color:C.sub,marginBottom:12,lineHeight:1.6}}>
              測定値の変化が試合成績にどう繋がったかを見える化しています。
            </div>

            {/* ブラスト→長打率 */}
            <div style={{background:"rgba(196,118,58,0.07)",borderRadius:14,padding:"13px",marginBottom:10,border:`1px solid rgba(196,118,58,0.2)`}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:18}}>💥</span>
                <div style={{fontSize:12,fontWeight:700,color:C.text}}>ブラスト向上 → 打力への影響</div>
              </div>
              <div style={{fontSize:13,color:C.accent,fontWeight:700,marginBottom:6}}>
                {mh[0].batSpeed||"?"}mph → {latest.batSpeed||"?"}mph
              </div>
              <div style={{fontSize:12,color:C.sub,lineHeight:1.6,marginBottom:10}}>
                シーズン通じてブラストが{((latest.batSpeed||0)-(mh[0].batSpeed||0)).toFixed(1)}mph向上。長打率{season.slg}、{season.d2}本の二塁打・{season.d3}本の三塁打に繋がっている。
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:C.sub}}>長打率</div>
                  <div style={{fontSize:18,fontWeight:900,color:C.accent}}>{season.slg}</div>
                </div>
                <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 10px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:C.sub}}>長打本数</div>
                  <div style={{fontSize:18,fontWeight:900,color:C.accent}}>{season.d2+season.d3+season.hr}本</div>
                </div>
              </div>
            </div>

            {/* ベースラン→機動力 */}
            <div style={{background:"rgba(76,175,114,0.07)",borderRadius:14,padding:"13px",marginBottom:10,border:`1px solid rgba(76,175,114,0.2)`}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:18}}>💨</span>
                <div style={{fontSize:12,fontWeight:700,color:C.text}}>ベースラン短縮 → 機動力への影響</div>
              </div>
              <div style={{fontSize:13,color:C.green,fontWeight:700,marginBottom:6}}>
                {mh[0].run}秒 → {latest.run}秒（{(mh[0].run-latest.run).toFixed(2)}秒短縮）
              </div>
              {sbStats.attempts > 0 ? (
                <>
                  <div style={{fontSize:12,color:C.sub,lineHeight:1.6,marginBottom:10}}>
                    走力向上が盗塁に直結。{sbStats.sb}盗塁{sbStats.cs>0?`・${sbStats.cs}盗塁死`:""}（成功率{sbStats.pct}%）を記録。今シーズン{season.r}得点に貢献。
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:9,color:C.sub}}>盗塁</div>
                      <div style={{fontSize:20,fontWeight:900,color:C.green}}>{sbStats.sb}</div>
                    </div>
                    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:9,color:C.sub}}>成功率</div>
                      <div style={{fontSize:20,fontWeight:900,color:sbStats.pct>=80?C.green:C.accent}}>{sbStats.pct}%</div>
                    </div>
                    <div style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px",textAlign:"center"}}>
                      <div style={{fontSize:9,color:C.sub}}>得点</div>
                      <div style={{fontSize:20,fontWeight:900,color:C.green}}>{season.r}</div>
                    </div>
                  </div>
                </>
              ) : (
                <div style={{fontSize:12,color:C.sub,lineHeight:1.6}}>
                  走力向上が出塁後の得点力に直結。今シーズン{season.r}得点を記録。盗塁記録は走塁ログに未登録。
                </div>
              )}
            </div>

            {/* 球速→打撃との関係 */}
            <div style={{background:"rgba(91,141,239,0.07)",borderRadius:14,padding:"13px",marginBottom:10,border:`1px solid rgba(91,141,239,0.2)`}}>
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:18}}>🔥</span>
                <div style={{fontSize:12,fontWeight:700,color:C.text}}>球速向上 → 総合力</div>
              </div>
              <div style={{fontSize:13,color:C.blue,fontWeight:700,marginBottom:6}}>
                {(mh[0].pitchMound||'未測定')}km/h → {(latest.pitchMound||'未測定')}km/h
              </div>
              <div style={{fontSize:12,color:C.sub,lineHeight:1.6}}>
                球速・ブラスト・走力の3つが同時に成長。打率{season.avg}・OPS{season.ops}という結果に繋がっている。
              </div>
            </div>

            {/* ノート連動 */}
            <Card style={{background:"rgba(91,141,239,0.06)",border:`1px solid rgba(91,141,239,0.2)`}}>
              <div style={{display:"flex",gap:8,marginBottom:8}}><span>📓</span>
                <div style={{fontSize:12,fontWeight:700,color:C.text}}>今日のノートに書くこと</div>
              </div>
              {["測定値の変化は試合の感覚と一致していたか？","どの数字が一番試合に影響したと思うか？","次の測定で更新したい数字と理由は？"].map((p,i)=>(
                <div key={i} style={{display:"flex",gap:8,padding:"8px 0",borderBottom:i<2?`1px solid ${C.border}`:"none"}}>
                  <div style={{width:20,height:20,borderRadius:"50%",flexShrink:0,
                    background:`linear-gradient(135deg,${C.accent},${C.accentB})`,
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"#fff"}}>{i+1}</div>
                  <div style={{fontSize:12,color:C.sub,lineHeight:1.5}}>{p}</div>
                </div>
              ))}
            </Card>
          </>}
        </>}

        {/* ── 📋 試合別 ── */}
        {sub==="games"&&<>
          {/* チーム切り替え */}
          <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
            {["合計",...AVAILABLE_TEAMS].map(v=>(
              <button key={v} onClick={()=>setTeamFilter(v)} style={{
                padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:teamFilter===v?800:500,
                background:teamFilter===v?"rgba(91,141,239,0.25)":"rgba(255,255,255,0.05)",
                color:teamFilter===v?C.blue:C.dim,
                border:teamFilter===v?`1px solid rgba(91,141,239,0.45)`:`1px solid ${C.border}`,
              }}>{v}</button>
            ))}
            {["レギュラー","スーパージュニア"].filter(t=>!AVAILABLE_TEAMS.includes(t)).map(v=>(
              <span key={v} style={{padding:"4px 12px",borderRadius:20,fontSize:11,
                background:"rgba(255,255,255,0.02)",color:"rgba(255,255,255,0.15)",
                border:`1px solid rgba(255,255,255,0.06)`,display:"inline-flex",alignItems:"center",gap:3,
              }}>{v}<span style={{fontSize:9,opacity:0.6}}>準備中</span></span>
            ))}
            {/* OP/公式切り替え */}
            <div style={{width:"100%",height:1}}/>
            {["合計","OP","公式"].map(v=>(
              <button key={v} onClick={()=>setTypeFilter(v)} style={{
                padding:"4px 12px",borderRadius:20,border:"none",cursor:"pointer",fontSize:11,fontWeight:typeFilter===v?800:500,
                background:typeFilter===v?"rgba(76,175,114,0.22)":"rgba(255,255,255,0.05)",
                color:typeFilter===v?C.green:C.dim,
                border:typeFilter===v?`1px solid rgba(76,175,114,0.4)`:`1px solid ${C.border}`,
              }}>{v==="合計"?"全試合":v==="OP"?"OP戦":"公式戦"}</button>
            ))}
          </div>
          <SL>試合別成績（{gameStats.length}試合）</SL>
          {gameStats.length===0&&(
            <div style={{textAlign:"center",padding:"30px 0",color:C.dim,fontSize:13}}>
              該当する試合データがありません
            </div>
          )}
          {gameStats.map(({g,date,label,s},gi)=>{
            // gameType label
            const gtLabel = rows.find(r=>r.opponent===g&&(r.date||"no-date")===(date||"no-date"))?.gameType;
            const gameKey=`${date||"no-date"}|${g}|${gi}`;
            return(
            <Card key={gameKey}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:C.text}}>vs {g}{date&&<span style={{fontSize:10,color:C.sub,marginLeft:5}}>{date.replace("2025/","")}</span>}</div>
                  <div style={{display:"flex",gap:4,alignItems:"center",marginTop:2}}>
                    {gtLabel&&<span style={{fontSize:9,color:gtLabel==="公式"?C.accent:C.sub,
                      background:gtLabel==="公式"?"rgba(196,118,58,0.15)":"rgba(255,255,255,0.05)",
                      borderRadius:4,padding:"1px 5px"}}>{gtLabel==="公式"?"公式戦":"OP戦"}</span>}
                    {rows.find(r=>r.opponent===g)?.date&&
                      <span style={{fontSize:9,color:C.dim}}>{rows.find(r=>r.opponent===g).date}</span>}
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:900,color:C.blue}}>{s.avg}</div>
                  <div style={{fontSize:10,color:C.sub}}>{s.h}/{s.ab}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:7}}>
                {s.hr>0&&<Pill color={C.gold}>HR {s.hr}</Pill>}
                {s.d3>0&&<Pill color={C.purple}>3B {s.d3}</Pill>}
                {s.d2>0&&<Pill color={C.accent}>2B {s.d2}</Pill>}
                {s.rbi>0&&<Pill color={C.green}>打点{s.rbi}</Pill>}
                {s.bb>0&&<Pill color={C.blue}>BB{s.bb}</Pill>}
                {s.k>0&&<Pill color="#E05A5A">K {s.k}</Pill>}
              </div>
              <div style={{height:3,background:C.border,borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:2,transition:"width 0.5s",
                  width:`${s.ab>0?Math.min((s.h/s.ab)*100,100):0}%`,
                  background:`linear-gradient(90deg,${C.blue},${C.accent})`}}/>
              </div>
            </Card>
            );
          })}
        </>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  チームページ
// ═══════════════════════════════════════════════════════════════
function TeamPage(){
  const [sort,setSort]=useState("ops");
  const [mainTab,setMainTab]=useState("stats");
  const [teamFilter,setTeamFilter]=useState("合計");
  const [typeFilter,setTypeFilter]=useState("合計");

  // カテゴリーフィルター
  const baseRecords = teamFilter==="合計" ? ALL_RECORDS
    : teamFilter==="ジュニア"   ? GAME_RECORDS
    : teamFilter==="レギュラー" ? REG_GAME_RECORDS
    : SJ_GAME_RECORDS;

  // OP/公式フィルター
  const filteredRecords = typeFilter==="合計" ? baseRecords
    : baseRecords.filter(r=>r.gameType===typeFilter);

  const teamTotal=calcStats(filteredRecords);

  // 正確な試合数カウント（同一対戦相手が2回＝ダブルヘッダー2試合）
  const countGames = (records) => {
    let count = 0;
    let prev = null;
    const seen = {};
    for(const r of records){
      const key = r.opponent + r.gameType;
      if(key !== prev){
        count++;
        prev = key;
      }
    }
    return count;
  };
  const totalGames = countGames(filteredRecords);

  // 盗塁ログもフィルター（totalSBより前に定義必須）
  const baseSBLog = teamFilter==="合計" ? ALL_SB_LOG
    : teamFilter==="ジュニア"   ? SB_LOG
    : teamFilter==="レギュラー" ? REG_SB_LOG
    : SJ_SB_LOG;
  const filteredSBLog = typeFilter==="合計" ? baseSBLog
    : baseSBLog.filter(r=>r.gameType===typeFilter);

  const totalSB = filteredSBLog.reduce((s,r)=>s+r.sb, 0);
  const totalCS = filteredSBLog.reduce((s,r)=>s+r.cs, 0);

  const [rankTab,setRankTab]=useState("batting");
  const [rankTeam,setRankTeam]=useState("合計");
  const rankBaseRecords=rankTeam==="合計"?ALL_RECORDS:rankTeam==="ジュニア"?GAME_RECORDS:rankTeam==="レギュラー"?REG_GAME_RECORDS:SJ_GAME_RECORDS;
  const rankPlayers=[...new Set(rankBaseRecords.map(r=>r.player))];
  const teamColor2=(t)=>t==="レギュラー"?C.blue:t==="ジュニア"?C.accent:C.purple;
  const medal=(i)=>i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}`;
  const getTC=(p)=>REG_PLAYERS_MANUAL.includes(p)?"レギュラー":JR_PLAYERS_MANUAL.includes(p)?"ジュニア":"SJr";

  // チームフィルターに対応した盗塁ログ
  const rankSBLog=rankTeam==="合計"?ALL_SB_LOG
    :rankTeam==="ジュニア"?SB_LOG
    :rankTeam==="レギュラー"?REG_SB_LOG
    :SJ_SB_LOG;

  const battingRanks=rankPlayers.map(p=>{
    const s=calcStats(rankBaseRecords.filter(r=>r.player===p));
    const sb=rankSBLog.filter(r=>r.player===p).reduce((a,r)=>a+r.sb,0);
    return {p,s,sb,tc:getTC(p)};
  }).filter(x=>x.s.ab>=3);

  const measureRanks=rankPlayers.map(p=>{
    const mh=MEASUREMENT[p]||[];
    const sw=mh.find(e=>e.type==="swing");
    const pt=mh.find(e=>e.type==="pitch");
    const br=mh.find(e=>e.type==="baserun");
    return {p,tc:getTC(p),swingMax:sw?sw.max:null,swingAvg:sw?sw.avg:null,mound:pt?pt.mound:null,pd:pt?pt.pd:null,dash:br?br.dash:null,d2:br?br.d2:null,d3:br?br.d3:null,hr:br?br.hr:null};
  }).filter(x=>x.swingMax||x.mound||x.dash);

  const playerRanks=[...new Set(filteredRecords.map(r=>r.player))].map(p=>{
    const s=calcStats(filteredRecords.filter(r=>r.player===p));
    const mh=MEASUREMENT[p]||[];
    const sw=mh.find(e=>e.type==="swing");
    const blastGrow=sw&&sw.history&&sw.history.length>=2?sw.history[sw.history.length-1].avg-sw.history[0].avg:null;
    return {p,s,blastGrow};
  }).filter(x=>x.s.ab>=3).sort((a,b)=>{
    if(sort==="ops") return b.s.opsN-a.s.opsN;
    if(sort==="avg") return b.s.avgN-a.s.avgN;
    if(sort==="h")   return b.s.h-a.s.h;
    if(sort==="rbi") return b.s.rbi-a.s.rbi;
    if(sort==="blast") return (b.blastGrow||0)-(a.blastGrow||0);
    return 0;
  });

  const gameHits=[...new Set(filteredRecords.map(r=>r.opponent))].map(g=>({
    label:(()=>{
      const num = g.includes('①')?'①':g.includes('②')?'②':g.includes('③')?'③':'';
      const name = g.replace(/ヤング|クラブ|ボーイズ|BBC|OP戦|公式戦/g,"").replace(/[①②③]/g,"").trim();
      const short = name.slice(0,3)||g.slice(0,3);
      return short+(num?num:'');
    })(),
    v:filteredRecords.filter(r=>r.opponent===g).reduce((s,r)=>s+r.h,0)
  }));

  // 測定チーム平均
  const hasMeasure=Object.keys(MEASUREMENT).length>0;
  const measurePlayers=Object.keys(MEASUREMENT);
  const latestAvg=(key)=>{
    const vals=measurePlayers.map(p=>{const mh=MEASUREMENT[p];return mh[mh.length-1][key]||0;}).filter(v=>v>0);
    if(!vals.length) return "0";
    return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(key==="run1b"?2:1);
  };
  const firstAvg=(key)=>{
    const vals=measurePlayers.map(p=>{const mh=MEASUREMENT[p];return mh[0][key]||0;}).filter(v=>v>0);
    if(!vals.length) return "0";
    return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(key==="run1b"?2:1);
  };

  return(
    <div style={{paddingBottom:80}}>
      <div style={{background:"linear-gradient(135deg,#1A2D42,#0B1520)",padding:"14px 14px 10px",borderBottom:`1px solid rgba(196,118,58,0.25)`}}>
        <div style={{fontSize:18,fontWeight:900,color:"#fff"}}>堺イーグルス</div>
        <div style={{fontSize:11,color:C.sub,marginTop:1,marginBottom:8}}>チーム成長ダッシュボード</div>
        {/* カテゴリー切り替えボタン */}
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
          {/* 合計ボタン */}
          <button onClick={()=>setTeamFilter("合計")} style={{
            display:"flex",alignItems:"center",gap:5,
            background:teamFilter==="合計"?"rgba(255,255,255,0.12)":"rgba(255,255,255,0.04)",
            borderRadius:20,padding:"5px 11px",cursor:"pointer",
            border:teamFilter==="合計"?`1px solid rgba(255,255,255,0.4)`:`1px solid ${C.border}`,
          }}>
            <div style={{width:6,height:6,borderRadius:"50%",background:teamFilter==="合計"?"#fff":"rgba(255,255,255,0.3)"}}/>
            <span style={{fontSize:10,fontWeight:teamFilter==="合計"?800:500,color:teamFilter==="合計"?"#fff":C.sub}}>合計</span>
            <span style={{fontSize:9,color:C.dim}}>{[...new Set(ALL_RECORDS.map(r=>r.opponent))].length}試合</span>
          </button>
          {[
            {name:"ジュニア",  records:GAME_RECORDS,     color:C.accent},
            {name:"レギュラー",records:REG_GAME_RECORDS, color:C.blue},
            {name:"スーパーJr",records:SJ_GAME_RECORDS,  color:C.purple},
          ].map(c=>{
            const hasData = c.records.length>0;
            const active = teamFilter===c.name;
            return(
              <button key={c.name} onClick={()=>hasData&&setTeamFilter(c.name)}
                style={{
                  display:"flex",alignItems:"center",gap:5,
                  background:active?`${c.color}22`:hasData?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.01)",
                  borderRadius:20,padding:"5px 11px",
                  border:active?`1px solid ${c.color}88`:hasData?`1px solid ${c.color}33`:`1px solid ${C.border}`,
                  cursor:hasData?"pointer":"default",opacity:hasData?1:0.5,
                }}>
                <div style={{width:6,height:6,borderRadius:"50%",background:hasData?c.color:"rgba(255,255,255,0.15)"}}/>

                <div style={{padding:"9px 6px",fontSize:13,fontWeight:800,color:C.blue,textAlign:"center"}}>{o.avg.toFixed(3).replace(/^0/,"")}</div>
                <div style={{padding:"9px 6px",fontSize:13,fontWeight:800,color:isBest?C.accent:C.sub,textAlign:"center"}}>{o.ops.toFixed(3).replace(/^0/,"")}</div>
                <div style={{padding:"9px 6px",fontSize:12,color:C.green,textAlign:"center"}}>{o.rbi}</div>
                <div style={{padding:"9px 6px",fontSize:12,color:C.blue,textAlign:"center"}}>{o.r}</div>
              </div>
            );
          })}
        </Card>

        {/* チーム対左右 */}
        <SL>⚡ チーム対左右投手</SL>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          {[
            {label:"対右投手",avg:TEAM_VS.rAVG,ops:TEAM_VS.rOPS,pa:TEAM_VS.rPA,h:TEAM_VS.rH,color:C.blue},
            {label:"対左投手",avg:TEAM_VS.lAVG,ops:TEAM_VS.lOPS,pa:TEAM_VS.lPA,h:TEAM_VS.lH,color:C.purple},
          ].map(m=>(
            <div key={m.label} style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"12px",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:10,color:m.color,fontWeight:700,marginBottom:8}}>{m.label}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:4}}>
                <div><div style={{fontSize:8,color:C.dim}}>打率</div><div style={{fontSize:18,fontWeight:900,color:m.color}}>{m.avg.toFixed(3).replace(/^0/,"")}</div></div>
                <div><div style={{fontSize:8,color:C.dim}}>OPS</div><div style={{fontSize:18,fontWeight:900,color:m.color}}>{m.ops.toFixed(3).replace(/^0/,"")}</div></div>
              </div>
              <div style={{fontSize:10,color:C.dim}}>{m.pa}打席 · {m.h}安打</div>
            </div>
          ))}
        </div>

        {/* チーム得点圏 */}
        <div style={{background:"rgba(76,175,114,0.07)",borderRadius:14,padding:"13px",marginBottom:12,border:`1px solid rgba(76,175,114,0.2)`}}>
          <SL color={C.green}>🎯 チーム得点圏（RISP）</SL>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
            <StatBox label="得点圏打率" value={TEAM_RISP.avg.toFixed(3).replace(/^0/,"")} color={C.green}/>
            <StatBox label="得点圏OPS"  value={TEAM_RISP.ops.toFixed(3).replace(/^0/,"")} color={C.accent}/>
            <StatBox label="得点圏打点" value={TEAM_RISP.rbi} sub="RBI" color={C.green}/>
            <StatBox label="得点圏打席" value={TEAM_RISP.pa} sub="PA"/>
          </div>
        </div>

        {/* 盗塁ランキング */}
        <SL color={C.green}>🏃 チーム盗塁ランキング</SL>
        {(() => {
          const sbTotal = filteredSBLog.reduce((s,r)=>s+r.sb,0);
          const csTotal = filteredSBLog.reduce((s,r)=>s+r.cs,0);
          const teamPct = (sbTotal+csTotal)>0?Math.round(sbTotal/(sbTotal+csTotal)*100):0;
          const ranking = [...new Set(filteredSBLog.map(r=>r.player))].map(p=>{
            const rows = filteredSBLog.filter(r=>r.player===p);
            const sb = rows.reduce((s,r)=>s+r.sb,0);
            const cs = rows.reduce((s,r)=>s+r.cs,0);
            const pct = (sb+cs)>0?Math.round(sb/(sb+cs)*100):null;
            return {player:p,sb,cs,pct,attempts:sb+cs};
          }).filter(r=>r.attempts>0).sort((a,b)=>b.sb-a.sb);
          return (
            <>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}}>
                <StatBox label="チーム盗塁" value={sbTotal} color={C.green} sub="SB"/>
                <StatBox label="盗塁死"     value={csTotal} color={csTotal>0?"#E05A5A":C.dim} sub="CS"/>
                <StatBox label="成功率"     value={teamPct+"%"} color={teamPct>=80?C.green:C.accent}/>
              </div>
              {ranking.map((r,i)=>(
                <div key={r.player} style={{display:"flex",alignItems:"center",gap:10,
                  padding:"9px 12px",background:"rgba(255,255,255,0.03)",borderRadius:10,
                  border:`1px solid ${C.border}`,marginBottom:6}}>
                  <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,
                    background:i===0?`linear-gradient(135deg,${C.gold},#FF8C00)`:i===1?"rgba(200,200,210,0.3)":i===2?"rgba(196,118,58,0.4)":"rgba(255,255,255,0.08)",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,
                    color:i<3?C.text:C.dim}}>{i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:13,fontWeight:700,color:C.text}}>{r.player}</span>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:16,fontWeight:900,color:C.green}}>{r.sb}</span>
                        {r.cs>0&&<span style={{fontSize:11,color:"#E05A5A"}}>/{r.cs}失</span>}
                        {r.pct!=null&&<span style={{fontSize:10,color:r.pct>=80?C.green:C.accent,background:r.pct>=80?"rgba(76,175,114,0.15)":"rgba(196,118,58,0.15)",borderRadius:5,padding:"1px 6px"}}>{r.pct}%</span>}
                      </div>
                    </div>
                    <div style={{height:3,background:C.border,borderRadius:2,overflow:"hidden",marginTop:5}}>
                      <div style={{height:"100%",borderRadius:2,
                        width:`${Math.min((r.sb/Math.max(...ranking.map(x=>x.sb),1))*100,100)}%`,
                        background:`linear-gradient(90deg,${C.green},#2E8B57)`}}/>
                    </div>
                  </div>
                </div>
              ))}
            </>
          );
        })()}
      </div>
    </div>
  );
}

                      <span style={{fontSize:11,color:e.er>0?"#E05A5A":C.dim}}>{e.er}自責</span>

                    </div>
                  </div>
                ))}
              </Card>
            );
          })}
        </>}

        {/* ── 先発vs救援比較 ── */}
        {sub==="compare"&&<>
          <SL color={C.purple}>先発 vs 救援 ERA比較</SL>
          {PITCH_STATS.filter(p=>p.gs>0).map(p=>{
            const s=PITCH_START.find(x=>x.name===p.name);
            const r=PITCH_RELIEF.find(x=>x.name===p.name);
            if(!s||!r) return null;

              <Card key={p.name} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>

                  <span style={{fontSize:12,color:diff>0?"#E05A5A":C.green,fontWeight:700}}>
                    救援時ERA {diff>0?"+":""}{diff.toFixed(2)}

                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <div style={{flex:1,background:"rgba(91,141,239,0.1)",borderRadius:8,padding:"8px 10px",border:`1px solid rgba(91,141,239,0.2)`}}>

                    <div style={{fontSize:18,fontWeight:900,color:C.blue}}>{s.era}</div>

        </>}
      </div>

  );
}

function TeamComparePage(){
  const teams=[

    {name:"SJr",color:C.purple,players:SJ_PLAYERS_MANUAL},
  ];
  const getStats=(players)=>{
    const recs=ALL_RECORDS.filter(r=>players.includes(r.player));
    const pa=recs.reduce((s,r)=>s+r.pa,0);
    const ab=recs.reduce((s,r)=>s+r.ab,0);
    const h=recs.reduce((s,r)=>s+r.h,0);
    const bb=recs.reduce((s,r)=>s+r.bb,0);
    const hbp=recs.reduce((s,r)=>s+r.hbp,0);
    const sf=recs.reduce((s,r)=>s+r.sf,0);
    const tb=recs.reduce((s,r)=>s+r.h+r.d2+r.d3*2+r.hr*3,0);
    const k=recs.reduce((s,r)=>s+r.k,0);
    const sb_recs=ALL_SB_LOG.filter(r=>players.includes(r.player));
    const sb=sb_recs.reduce((s,r)=>s+r.sb,0);
    const avg=ab>0?(h/ab).toFixed(3).replace(/^0/,""):"---";
    const obp=(pa-sf)>0?((h+bb+hbp)/(pa-sf)).toFixed(3).replace(/^0/,""):"---";
    const slg=ab>0?(tb/ab).toFixed(3).replace(/^0/,""):"---";
    const ops=(obp!=="---"&&slg!=="---")?(parseFloat(obp)+parseFloat(slg)).toFixed(3).replace(/^0/,""):"---";
    return {avg,obp,slg,ops,h,bb,k,sb,pa};

            return(
              <div key={t.name} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:t.color}}/>
                    <span style={{fontSize:13,fontWeight:700,color:t.color}}>{t.name}</span>
                    <span style={{fontSize:10,color:C.sub}}>{s.pa}打席</span>
                  </div>
                  <div style={{display:"flex",gap:12}}>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:9,color:C.sub}}>打率</div>
                      <div style={{fontSize:16,fontWeight:900,color:t.color}}>{s.avg}</div>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:9,color:C.sub}}>OPS</div>
                      <div style={{fontSize:16,fontWeight:900,color:t.color}}>{s.ops}</div>
                    </div>
                  </div>
                </div>
                {/* OPSバー */}
                <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",background:t.color,borderRadius:3,
                    width:`${Math.min(100,(parseFloat(s.ops||0)/1.2)*100)}%`,transition:"width 0.5s"}}/>
                </div>
              </div>
            );
          })}
        </Card>
        {/* 詳細比較 */}
        <Card>
          <SL color={C.purple}>詳細比較</SL>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>
                <tr>
                  {["チーム","安打","四球","三振","盗塁","長打率"].map(h=>(
                    <th key={h} style={{color:C.sub,fontWeight:700,padding:"4px 6px",textAlign:"center",borderBottom:`1px solid ${C.border}`}}>{h}</th>
                  ))}

    const seen=new Set();
    const list=[];
    [...ALL_RECORDS].sort((a,b)=>{
      if(!a.date&&!b.date) return 0;
      if(!a.date) return 1;
      if(!b.date) return -1;
      return new Date("2025/"+a.date.replace("2025/",""))-new Date("2025/"+b.date.replace("2025/",""));
    }).forEach(r=>{
      const key=`${r.date||"不明"}_${r.opponent}_${r.team}`;

// ─── 個人目標ページ ────────────────────────────────────────
function GoalPage(){
  const goalDefs=[
    {key:"avg",label:"目標打率",unit:"",step:0.001,min:0.1,max:0.5,color:C.accent},
    {key:"ops",label:"目標OPS",unit:"",step:0.001,min:0.3,max:1.5,color:C.gold},
    {key:"swing",label:"目標スイングMAX",unit:"km/h",step:1,min:50,max:150,color:C.blue},
    {key:"dash",label:"目標駆け抜け",unit:"秒",step:0.01,min:3.0,max:6.0,color:C.green},
  ];

  const [goals,setGoals]=useState({});
  const [editPlayer,setEditPlayer]=useState(ALL_PLAYERS[0]);

  const getCurrentVal=(player,key)=>{
    const recs=ALL_RECORDS.filter(r=>r.player===player);
    const ab=recs.reduce((s,r)=>s+r.ab,0);
    const h=recs.reduce((s,r)=>s+r.h,0);
    const pa=recs.reduce((s,r)=>s+r.pa,0);
    const bb=recs.reduce((s,r)=>s+r.bb,0);
    const hbp=recs.reduce((s,r)=>s+r.hbp,0);
    const sf=recs.reduce((s,r)=>s+r.sf,0);
    const tb=recs.reduce((s,r)=>s+r.h+r.d2+r.d3*2+r.hr*3,0);
    const obp=(pa-sf)>0?(h+bb+hbp)/(pa-sf):0;
    const slg=ab>0?tb/ab:0;
    if(key==="avg") return ab>0?h/ab:0;
    if(key==="ops") return obp+slg;
    if(key==="swing"){
      const m=MEASUREMENT[player];
      if(!m) return 0;
      const sw=m.find(e=>e.type==="swing");
      return sw?sw.max:0;
    }
    if(key==="dash"){
      const m=MEASUREMENT[player];
      if(!m) return 0;
      const br=m.find(e=>e.type==="baserun");
      return br?br.dash:0;
    }
    return 0;
  };

  const setGoal=(player,key,val)=>{
    setGoals(g=>({...g,[player]:{...g[player],[key]:val}}));
  };

  const playerColor=(p)=>{
    if(REG_PLAYERS_MANUAL.includes(p)) return C.blue;
    if(JR_PLAYERS_MANUAL.includes(p)) return C.accent;
    return C.purple;
  };

  const pGoals=goals[editPlayer]||{};

  return(
    <div style={{paddingBottom:80}}>
      <div style={{background:"linear-gradient(135deg,#1A2D42,#0B1520)",padding:"14px 14px 10px",borderBottom:`1px solid rgba(255,215,0,0.3)`}}>
        <div style={{fontSize:11,color:C.gold,fontWeight:700,letterSpacing:2,marginBottom:3}}>GOAL SETTING</div>
        <div style={{fontSize:18,fontWeight:900,color:"#fff"}}>個人目標設定</div>
      </div>
      <div style={{padding:"13px 14px"}}>
        {/* 選手選択 */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
          {ALL_PLAYERS.slice(0,20).map(p=>(
            <button key={p} onClick={()=>setEditPlayer(p)}
              style={{background:editPlayer===p?playerColor(p):"rgba(255,255,255,0.05)",
                color:editPlayer===p?"#fff":C.sub,border:`1px solid ${editPlayer===p?playerColor(p):C.border}`,
                borderRadius:16,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
              {p}
            </button>
          ))}
        </div>

        {goalDefs.map(def=>{
          const current=getCurrentVal(editPlayer,def.key);
          const goal=pGoals[def.key];
          const hasGoal=goal!=null;
          const achieved=hasGoal&&(def.key==="dash"?current<=goal:current>=goal);
          const progress=hasGoal&&current>0?(def.key==="dash"
            ?(goal/current)*100
            :(current/goal)*100):0;

          return(
            <Card key={def.key}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <SL color={def.color}>{def.label}</SL>
                {achieved&&<span style={{fontSize:10,color:C.green,fontWeight:700,background:"rgba(76,175,114,0.15)",padding:"2px 8px",borderRadius:6}}>✅ 達成</span>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                <div style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:C.sub,marginBottom:2}}>現在値</div>
                  <div style={{fontSize:18,fontWeight:900,color:def.color}}>
                    {current>0?(def.key==="avg"||def.key==="ops"?current.toFixed(3).replace(/^0/,""):current.toFixed(def.step<0.1?2:1)):"---"}
                    <span style={{fontSize:10,color:C.sub,marginLeft:2}}>{def.unit}</span>
                  </div>
                </div>
                <div style={{background:"rgba(255,255,255,0.04)",borderRadius:10,padding:"10px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:C.sub,marginBottom:2}}>目標</div>
                  <div style={{fontSize:18,fontWeight:900,color:hasGoal?def.color:C.dim}}>
                    {hasGoal?(def.key==="avg"||def.key==="ops"?parseFloat(goal).toFixed(3).replace(/^0/,""):parseFloat(goal).toFixed(def.step<0.1?2:1)):"未設定"}
                    {hasGoal&&<span style={{fontSize:10,color:C.sub,marginLeft:2}}>{def.unit}</span>}
                  </div>
                </div>
              </div>
              {hasGoal&&current>0&&(
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:C.sub,marginBottom:4}}>
                    <span>達成度</span><span>{Math.min(100,Math.round(progress))}%</span>
                  </div>
                  <div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",background:achieved?C.green:def.color,borderRadius:3,
                      width:`${Math.min(100,progress)}%`,transition:"width 0.5s"}}/>
                  </div>
                </div>
              )}
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <input type="number" step={def.step} min={def.min} max={def.max}
                  value={goal||""}
                  onChange={e=>setGoal(editPlayer,def.key,e.target.value)}
                  placeholder={`目標値を入力 (${def.unit})`}
                  style={{flex:1,background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,
                    borderRadius:8,padding:"8px 10px",color:C.text,fontSize:12,outline:"none",fontFamily:"inherit"}}/>
                {hasGoal&&(
                  <button onClick={()=>setGoal(editPlayer,def.key,null)}
                    style={{background:"rgba(255,255,255,0.06)",border:`1px solid ${C.border}`,
                      borderRadius:8,padding:"8px 10px",color:C.dim,fontSize:11,cursor:"pointer"}}>
                    消去
                  </button>
                )}
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}
